services:
  zha-jin-hua:
    image: ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPOSITORY_NAME:latest
    container_name: zha-jin-hua
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATA_DIR: /app/data
      STARTING_CHIPS: 100
      ANTE: 1
      BLIND_MAX_STAKE_MULTIPLIER: 10
      SEEN_MAX_STAKE_MULTIPLIER: 20
      MAX_PLAYERS: 17
      MAX_FAILED_JOINS: 20
      ROOM_IDLE_MINUTES: 30
      SESSION_TTL_HOURS: 168
      TURN_TIMEOUT_SECONDS: 15
      TURN_EXTENSION_SECONDS: 30
      EXTENSION_INTERVAL_ROUNDS: 30
      AUTO_NEXT_DELAY_SECONDS: 3
      # ADMIN_USERNAME: admin
      # ADMIN_PASSWORD: change-me
    volumes:
      - ./data:/app/data
