services:
  zha-jin-hua:
    image: ghcr.io/YOUR_GITHUB_USERNAME/YOUR_REPOSITORY_NAME:latest
    container_name: zha-jin-hua
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATA_DIR: /app/data
      STARTING_CHIPS: 1000
      ANTE: 10
      MAX_PLAYERS: 17
      MAX_FAILED_JOINS: 20
      ROOM_IDLE_MINUTES: 30
      SESSION_TTL_HOURS: 168
      # ADMIN_USERNAME: admin
      # ADMIN_PASSWORD: change-me
    volumes:
      - ./data:/app/data
