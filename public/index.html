<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>炸金花</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main id="app" class="app">
      <section class="auth-view" id="authView">
        <div class="auth-panel">
          <p class="eyebrow">ZHA JIN HUA</p>
          <h1>炸金花</h1>
          <div class="tabs">
            <button id="loginTab" class="tab active" type="button">登录</button>
            <button id="registerTab" class="tab" type="button">注册</button>
          </div>
          <form id="authForm" class="join-form">
            <label>
              用户名
              <input id="usernameInput" maxlength="24" autocomplete="username" required>
            </label>
            <label id="displayNameLabel" class="hidden">
              昵称
              <input id="displayNameInput" maxlength="16" autocomplete="nickname" placeholder="显示在牌桌上的名字">
            </label>
            <label>
              密码
              <input id="authPasswordInput" type="password" maxlength="72" autocomplete="current-password" required>
            </label>
            <button class="primary" type="submit" id="authSubmit">登录</button>
          </form>
        </div>
      </section>

      <section class="lobby-view hidden" id="lobbyView">
        <header class="topbar lobby-topbar">
          <div>
            <p class="eyebrow">当前账号</p>
            <h2 id="accountTitle">玩家</h2>
          </div>
          <div class="top-actions">
            <button id="adminBtn" class="secondary hidden" type="button">管理</button>
            <button id="logoutBtn" class="text-button" type="button">退出</button>
          </div>
        </header>

        <section class="lobby-grid">
          <form id="profileForm" class="tool-panel">
            <h3>个人资料</h3>
            <label>
              昵称
              <input id="profileDisplayNameInput" maxlength="16" autocomplete="nickname">
            </label>
            <label>
              当前密码
              <input id="profileCurrentPasswordInput" type="password" maxlength="72" autocomplete="current-password" placeholder="改密码时填写">
            </label>
            <label>
              新密码
              <input id="profileNewPasswordInput" type="password" maxlength="72" autocomplete="new-password" placeholder="留空则不修改密码">
            </label>
            <button class="primary" type="submit">保存资料</button>
          </form>

          <form id="createRoomForm" class="tool-panel">
            <h3>创建房间</h3>
            <label>
              房间号
              <input id="createRoomInput" maxlength="8" autocapitalize="characters" placeholder="留空自动生成">
            </label>
            <label>
              房间密码
              <input id="createPasswordInput" maxlength="64" autocomplete="off" placeholder="公网建议填写">
            </label>
            <div class="form-row">
              <label>
                人数
                <input id="createPlayerLimitInput" type="number" min="2" max="17" inputmode="numeric" value="10">
              </label>
              <label>
                底注
                <input id="createAnteInput" type="number" min="1" inputmode="numeric" value="10">
              </label>
            </div>
            <div class="form-row">
              <label>
                初始筹码
                <input id="createChipsInput" type="number" min="50" inputmode="numeric" value="1000">
              </label>
              <label>
                最大加注倍数
                <input id="createRaiseInput" type="number" min="2" max="100" inputmode="numeric" value="20">
              </label>
            </div>
            <button class="primary" type="submit">创建并进入</button>
          </form>

          <form id="joinRoomForm" class="tool-panel">
            <h3>加入房间</h3>
            <label>
              房间号
              <input id="joinRoomInput" maxlength="8" autocapitalize="characters" required>
            </label>
            <label>
              房间密码
              <input id="joinPasswordInput" maxlength="64" autocomplete="off">
            </label>
            <button class="primary" type="submit">加入</button>
          </form>
        </section>
      </section>

      <section class="game-view hidden" id="gameView">
        <header class="topbar">
          <div>
            <p class="eyebrow room-line">
              房间 <button id="copyRoomBtn" class="text-button" type="button"></button>
              <button id="voiceBtn" class="text-button" type="button">开麦</button>
            </p>
            <h2 id="statusTitle">等待加入</h2>
          </div>
          <div class="bank">
            <span>奖池</span>
            <strong id="potValue">0</strong>
          </div>
        </header>

        <section class="table-band">
          <div class="table" id="table">
            <div class="table-center">
              <span id="stakeValue">当前注 10</span>
              <strong id="turnValue">等待</strong>
            </div>
            <div class="players" id="players"></div>
          </div>
        </section>

        <section class="hand-panel">
          <div>
            <p class="eyebrow">我的手牌</p>
            <div class="my-cards" id="myCards"></div>
          </div>
          <div class="my-rank" id="myRank">未开局</div>
        </section>

        <section class="controls" id="controls"></section>

        <details class="mobile-details">
          <summary>规则与记录</summary>
          <section class="details">
            <div class="rules">
              <h3>规则</h3>
              <p>牌型大小：豹子、顺金、同花、顺子、对子、单张。235 吃豹子。豹子有喜每人给底注 20 倍，顺金有喜每人给底注 10 倍。弃牌不公开，比牌公开。</p>
            </div>
            <div class="log">
              <h3>牌局记录</h3>
              <ol id="logList"></ol>
            </div>
          </section>
        </details>
      </section>

      <section class="admin-view hidden" id="adminView">
        <header class="topbar">
          <div>
            <p class="eyebrow">ADMIN</p>
            <h2>管理面板</h2>
          </div>
          <button id="backLobbyBtn" class="secondary" type="button">返回大厅</button>
        </header>
        <section class="admin-grid">
          <div class="tool-panel">
            <h3>房间</h3>
            <div id="adminRooms" class="admin-list"></div>
          </div>
          <div class="tool-panel">
            <h3>用户</h3>
            <div id="adminUsers" class="admin-list"></div>
          </div>
        </section>
      </section>
    </main>
    <div id="remoteAudioRoot" class="remote-audio" aria-hidden="true"></div>

    <template id="playerTemplate">
      <article class="player">
        <div class="player-head">
          <strong class="player-name"></strong>
          <span class="player-state"></span>
        </div>
        <div class="mini-cards"></div>
        <div class="player-foot">
          <span class="chips"></span>
          <span class="bet"></span>
        </div>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
